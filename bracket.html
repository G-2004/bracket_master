<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Bracket</title>

    <link rel="icon" href="assets/images/favicon.png"> 
    <link rel="stylesheet" href="assets/css/bracket.css"/>
    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
</head>
<body>

    <!-- NAVBAR -->
    <header class="navBar">

        <div class="navLeft">
            <a href="index.html" class="backButton">
                ← Back
            </a>
        </div>

        <div class="navCenter">
            <h1 id="bracket-title">Loading Bracket...</h1>
        </div>

        <div class="navRight">
            <button id="edit-bracket-btn">Edit Bracket</button>
            <button id="export-bracket-btn">Download Bracket</button>
        </div>

    </header>

    
    <!-- BRACKET HEADER -->
    <section class="bracketHeader">

        <img id="bracket-thumbnail" alt="Bracket Thumbnail" />

        <div class="bracketHeaderInfo">
            <h2 id="bracket-name">Bracket Name</h2>
            <p id="bracket-description">Optional bracket description.</p>
        </div>

    </section>

    <!-- CONTROLS -->
    <section class="controlsSection">

        <button id="add-competitor-btn">Add Competitor</button>
        <button id="start-bracket-btn">Start Bracket</button>

    </section>

        <!-- COMPETITORS -->
    <main class="mainLayout">

        <section class="competitorsSection">
            

            <div class="sectionHeader">
                <h2>Competitors</h2>
            </div>

            <input id="competitor-search" placeholder="Search competitors..." />

            <div class="competitorGrid" id="competitor-grid">
                <!-- Competitor cards inserted here -->
            </div>

            <p class="emptyMessage" id="empty-competitors">
                No competitors added.
            </p>

        </section>

        <!-- BRACKET VIEW -->
        <section class="bracketSection">

            <div class="sectionHeader">
                <h2>Tournament</h2>
            </div>

            <div class="bracketView" id="bracket-view">
                <svg id="bracket-lines" class=""></svg>
                <div id="bracket-nodes"></div>
            </div>

            <p class="emptyMessage" id="empty-bracket"><!-- currently never goes away -->
                Tournament has not started.
            </p>

            

        </section>

    </main>

    <!-- ADD COMPETITOR MODAL -->
    <div class="modalOverlay hidden" id="add-competitor-modal">

        <div class="modal">

            <div class="modalHeader">

                <h2>Add Competitor</h2>

                <button id="close-add-modal-btn">
                    X
                </button>

            </div>

            <div class="modalContent">

                <input
                    type="text"
                    id="competitor-name-input"
                    placeholder="Competitor Name"
                />

                <textarea
                    id="competitor-description-input"
                    placeholder="Description"
                ></textarea>

                <input
                    type="file"
                    id="competitor-image-input"
                    accept="image/*"
                />

                <img
                    id="competitor-preview"
                    hidden
                />

                <button id="save-competitor-btn">
                    Save Competitor
                </button>

            </div>

        </div>

    </div>

    <div id="slot-context-menu" class="contextMenu hidden">
        <button id="swap-w-selected">Swap With Selected</button>
        <button id="clear-winner">Clear Winner</button>
    </div>

    <!-- STATUS MESSAGE -->
    <div id="status-message"></div>

    <script type="module" src="assets/js/db.js"></script>
    <script type="module" src="assets/js/bracket.js"></script>

</body>
</html>
